<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>添加情节 - 玩具总动员后台</title>
    <link rel="stylesheet" href="static/css/style.css">
    <style>
        .admin-form {
            max-width: 800px;
            margin: 50px auto;
            background: #fff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .admin-form h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #555;
        }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }
        .submit-btn {
            background: #2196F3;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
        }
        .submit-btn:hover {
            background: #0b7dda;
        }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            text-align: center;
            width: 100%;
            color: #666;
        }
    </style>
</head>
<body>
<div class="container">
    <nav class="navbar">
        <div class="nav-brand">
            <h1>玩具总动员 - 后台管理</h1>
        </div>
        <ul class="nav-menu">
            <li><a href="/toy-story/">前台首页</a></li>
            <li><a href="/toy-story/plot">情节列表</a></li>
            <li><a href="/admin/toy/character/add">添加角色</a></li>
            <li><a href="/admin/toy/init">初始化数据</a></li>
        </ul>
    </nav>

    <form class="admin-form" method="POST" enctype="multipart/form-data">
        <h2>添加电影情节</h2>

        <div class="form-group">
            <label>电影标题 *</label>
            <input type="text" name="movie_title" required placeholder="例：玩具总动员">
        </div>

        <div class="form-group">
            <label>第几部 *</label>
            <input type="number" name="movie_number" required placeholder="例：1, 2, 3, 4">
        </div>

        <div class="form-group">
            <label>上映年份</label>
            <input type="number" name="release_year" placeholder="例：1995">
        </div>

        <div class="form-group">
            <label>导演</label>
            <input type="text" name="director" placeholder="例：约翰·拉塞特">
        </div>

        <div class="form-group">
            <label>评分</label>
            <input type="number" step="0.1" name="rating" placeholder="例：8.3">
        </div>

        <div class="form-group">
            <label>剧情概要</label>
            <textarea name="summary" placeholder="简述电影剧情..."></textarea>
        </div>

        <div class="form-group">
            <label>经典台词</label>
            <textarea name="key_quotes" placeholder="例：飞向宇宙，浩瀚无垠！"></textarea>
        </div>

        <div class="form-group">
            <label>电影启示</label>
            <textarea name="lesson" placeholder="例：友谊比嫉妒更重要。"></textarea>
        </div>

        <div class="form-group">
            <label>电影海报</label>
            <input type="file" name="poster" accept="image/*">
            <small style="color:#999">建议尺寸：300x450px</small>
        </div>

        <button type="submit" class="submit-btn">保存情节</button>
        <a href="/toy-story/plot" class="back-link">← 返回情节列表</a>
    </form>
</div>
</body>
</html>
